name: Bug report
description: Report something broken in MelodAI
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, deployment/local, relevant API provider
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove tokens, cookies, ARLs, and private data before posting.
