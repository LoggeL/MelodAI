name: Feature request
description: Suggest an improvement for MelodAI
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should MelodAI change or add?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
